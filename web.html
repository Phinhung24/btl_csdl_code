<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Điểm – GUI</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0f4ff;
  --surface:  #ffffff;
  --border:   #dde3f5;
  --primary:  #3b6ef8;
  --primary-h:#2a55d6;
  --success:  #22c55e;
  --danger:   #ef4444;
  --warning:  #f59e0b;
  --text:     #1e2640;
  --muted:    #7b85a3;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Be Vietnam Pro', sans-serif;
  --shadow:   0 2px 16px rgba(59,110,248,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}


header{
  background:var(--primary);
  color:#fff;
  padding:18px 28px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 2px 12px rgba(59,110,248,.3);
}
header .logo{
  width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;
}
header h1{font-size:1.2rem;font-weight:800;letter-spacing:-.01em;}
header p{font-size:.8rem;opacity:.8;margin-top:1px;}


.app{display:flex;min-height:calc(100vh - 70px);}


aside{
  width:210px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  padding:16px 10px;display:flex;flex-direction:column;gap:4px;
}
aside button{
  width:100%;text-align:left;background:none;border:none;cursor:pointer;
  padding:9px 14px;border-radius:8px;font-family:var(--sans);font-size:.88rem;
  font-weight:500;color:var(--muted);transition:.15s;display:flex;align-items:center;gap:8px;
}
aside button:hover{background:var(--bg);color:var(--text);}
aside button.active{background:#eff3ff;color:var(--primary);font-weight:700;}
aside .section-label{
  font-size:.7rem;font-weight:700;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;padding:12px 14px 4px;
}


.content{flex:1;padding:24px;overflow:auto;}
.content-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;
}
.content-header h2{font-size:1.2rem;font-weight:800;color:var(--text);}


.search-wrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.search-wrap input{
  border:1px solid var(--border);border-radius:8px;padding:7px 12px;
  font-family:var(--sans);font-size:.85rem;background:var(--surface);color:var(--text);
  width:210px;outline:none;transition:.2s;
}
.search-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,110,248,.1);}


.btn{
  display:inline-flex;align-items:center;gap:6px;
  border:none;border-radius:8px;cursor:pointer;font-family:var(--sans);font-weight:600;
  padding:8px 16px;font-size:.85rem;transition:.15s;white-space:nowrap;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-h);}
.btn-success{background:var(--success);color:#fff;}
.btn-success:hover{background:#16a34a;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#dc2626;}
.btn-warning{background:var(--warning);color:#fff;}
.btn-warning:hover{background:#d97706;}
.btn-ghost{background:var(--border);color:var(--text);}
.btn-ghost:hover{background:#c8d0e8;}
.btn-sm{padding:5px 10px;font-size:.78rem;border-radius:6px;}


.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;}
thead{background:#f5f7ff;}
thead th{
  padding:11px 14px;text-align:left;font-size:.78rem;font-weight:700;
  color:var(--muted);letter-spacing:.06em;text-transform:uppercase;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border);transition:.12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f8faff;}
tbody td{padding:10px 14px;font-size:.86rem;color:var(--text);}
.actions-cell{display:flex;gap:6px;white-space:nowrap;}


.badge{
  display:inline-block;padding:2px 9px;border-radius:99px;font-size:.72rem;font-weight:700;
}
.badge-A{background:#d1fae5;color:#065f46;}
.badge-B{background:#dbeafe;color:#1e40af;}
.badge-C{background:#fef9c3;color:#854d0e;}
.badge-D{background:#ffedd5;color:#9a3412;}
.badge-F{background:#fee2e2;color:#991b1b;}


.empty{text-align:center;padding:48px;color:var(--muted);}
.empty .icon{font-size:2.5rem;margin-bottom:12px;}


.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;
  align-items:center;justify-content:center;
}
.overlay.open{display:flex;}
.modal{
  background:var(--surface);border-radius:16px;width:min(520px,95vw);
  padding:28px;box-shadow:0 8px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;
  animation:slideUp .2s ease;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-size:1.05rem;font-weight:800;margin-bottom:18px;color:var(--text);}


.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:5px;}
.form-group input,.form-group select{
  width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;
  font-family:var(--sans);font-size:.88rem;background:var(--surface);color:var(--text);
  outline:none;transition:.2s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,110,248,.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}


.toast{
  position:fixed;bottom:24px;right:24px;background:#1e2640;color:#fff;
  padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;
  opacity:0;transform:translateY(10px);transition:.3s;z-index:200;pointer-events:none;
}
.toast.show{opacity:1;transform:none;}


.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px 18px;box-shadow:var(--shadow);
}
.stat-card .num{font-size:2rem;font-weight:800;color:var(--primary);line-height:1;}
.stat-card .label{font-size:.8rem;color:var(--muted);margin-top:4px;font-weight:500;}
</style>
</head>
<body>

<header>
  <div class="logo">🎓</div>
  <div>
    <h1>Quản Lý Điểm Sinh Viên</h1>
    <p>Hệ thống quản lý CSDL – Thêm · Sửa · Xóa · Xem</p>
  </div>
</header>

<div class="app">

  <aside>
    <div class="section-label">Quản lý</div>
    <button onclick="showTab('dashboard')" id="tab-dashboard" class="active">🏠 Tổng quan</button>
    <button onclick="showTab('sinhvien')"  id="tab-sinhvien">👤 Sinh viên</button>
    <button onclick="showTab('giangvien')" id="tab-giangvien">👨‍🏫 Giảng viên</button>
    <button onclick="showTab('monhoc')"    id="tab-monhoc">📚 Môn học</button>
    <button onclick="showTab('diem')"      id="tab-diem">📊 Điểm số</button>
    <div class="section-label" style="margin-top:8px">Danh mục</div>
    <button onclick="showTab('lop')"       id="tab-lop">🏫 Lớp học</button>
    <button onclick="showTab('khoa')"      id="tab-khoa">🏛 Khoa</button>
  </aside>


  <div class="content" id="content"></div>
</div>


<div class="overlay" id="overlay">
  <div class="modal" id="modal-box">
    <h3 id="modal-title">Form</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" id="modal-save" onclick="saveRecord()">💾 Lưu</button>
    </div>
  </div>
</div>


<div class="toast" id="toast"></div>

let currentTab = 'dashboard';
let editingIndex = null;
let editingTable = null;
let searchTerm = '';


function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type==='success'?'✅ ':'❌ ') + msg;
  t.style.background = type==='success'?'#16a34a':'#dc2626';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}


function showTab(tab) {
  currentTab = tab; searchTerm = '';
  document.querySelectorAll('aside button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}


function render() {
  const c = document.getElementById('content');
  if (currentTab==='dashboard') { renderDashboard(c); return; }
  if (currentTab==='sinhvien')  { renderSV(c); return; }
  if (currentTab==='giangvien') { renderGV(c); return; }
  if (currentTab==='monhoc')    { renderMH(c); return; }
  if (currentTab==='diem')      { renderDiem(c); return; }
  if (currentTab==='lop')       { renderLop(c); return; }
  if (currentTab==='khoa')      { renderKhoa(c); return; }
}


function renderDashboard(c) {
  const xlCount = {};
  DB.diem.forEach(d=>{ xlCount[d.xl]=(xlCount[d.xl]||0)+1; });
  c.innerHTML = `
    <div class="content-header"><h2>🏠 Tổng quan hệ thống</h2></div>
    <div class="stats">
      <div class="stat-card"><div class="num">${DB.sinh_vien.length}</div><div class="label">👤 Sinh viên</div></div>
      <div class="stat-card"><div class="num">${DB.giang_vien.length}</div><div class="label">👨‍🏫 Giảng viên</div></div>
      <div class="stat-card"><div class="num">${DB.mon_hoc.length}</div><div class="label">📚 Môn học</div></div>
      <div class="stat-card"><div class="num">${DB.diem.length}</div><div class="label">📊 Bản ghi điểm</div></div>
      <div class="stat-card"><div class="num">${DB.lop.length}</div><div class="label">🏫 Lớp học</div></div>
      <div class="stat-card"><div class="num">${DB.khoa.length}</div><div class="label">🏛 Khoa</div></div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);">
      <div style="font-weight:700;margin-bottom:14px;font-size:.95rem;">📊 Phân bố xếp loại điểm</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${['A','B','C','D','F'].map(xl=>`
          <div style="flex:1;min-width:80px;background:var(--bg);border-radius:10px;padding:14px;text-align:center;">
            <span class="badge badge-${xl}" style="font-size:1rem;padding:4px 14px;">${xl}</span>
            <div style="font-size:1.6rem;font-weight:800;margin-top:8px;color:var(--primary);">${xlCount[xl]||0}</div>
            <div style="font-size:.75rem;color:var(--muted);">sinh viên</div>
          </div>`).join('')}
      </div>
    </div>`;
}


function renderSV(c) {
  const q = searchTerm.toLowerCase();
  const data = DB.sinh_vien.filter(r=>!q||r.ho_ten.toLowerCase().includes(q)||r.ma.includes(q)||r.ma_lop.toLowerCase().includes(q));
  c.innerHTML = `
    <div class="content-header">
      <h2>👤 Sinh viên <span style="font-weight:400;font-size:.9rem;color:var(--muted)">(${data.length} bản ghi)</span></h2>
      <div class="search-wrap">
        <input type="text" placeholder="🔍 Tìm tên, mã SV..." value="${searchTerm}" oninput="searchTerm=this.value;renderSV(document.getElementById('content'))">
        <button class="btn btn-primary" onclick="openAddSV()">➕ Thêm mới</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Mã SV</th><th>Họ tên</th><th>Ngày sinh</th><th>Giới tính</th><th>Lớp</th><th>Email</th><th>Thao tác</th></tr></thead>
        <tbody>${data.length?data.map((r,i)=>{

          <td><div class="actions-cell">
            <button class="btn btn-warning btn-sm" onclick="openEditKhoa(${i})">✏️ Sửa</button>
            <button class="btn btn-danger btn-sm"  onclick="deleteKhoa(${i})">🗑 Xóa</button>
          </div></td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>`;
}
function openAddKhoa(){
  editingIndex=null;editingTable='khoa';
  document.getElementById('modal-title').textContent='➕ Thêm khoa mới';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-row">
      <div class="form-group"><label>Mã khoa *</label><input id="f_ma" placeholder="VD: SINH"></div>
      <div class="form-group"><label>Tên khoa *</label><input id="f_ten" placeholder="Khoa Sinh học"></div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function openEditKhoa(i){
  editingIndex=i;editingTable='khoa';const r=DB.khoa[i];
  document.getElementById('modal-title').textContent='✏️ Sửa khoa';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-row">
      <div class="form-group"><label>Mã khoa</label><input id="f_ma" value="${r.ma_khoa}" readonly style="background:#f5f7ff;color:var(--muted)"></div>
      <div class="form-group"><label>Tên khoa *</label><input id="f_ten" value="${r.ten_khoa}"></div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function deleteKhoa(i){
  if(!confirm(`Xóa khoa "${DB.khoa[i].ten_khoa}"?`))return;
  DB.khoa.splice(i,1);toast('Đã xóa khoa');render();
}

function saveRecord(){
  const g=id=>document.getElementById(id)?.value.trim();
  if(editingTable==='sv'){
    const ma=g('f_ma'),ten=g('f_ten');
    if(!ma||!ten){toast('Vui lòng điền đầy đủ thông tin bắt buộc!','error');return;}
    const rec={ma,ho_ten:ten,ngay_sinh:g('f_ns'),gioi_tinh:g('f_gt'),email:g('f_email'),ma_lop:g('f_lop')};
    if(editingIndex===null){
      if(DB.sinh_vien.find(s=>s.ma===ma)){toast('Mã sinh viên đã tồn tại!','error');return;}
      DB.sinh_vien.push(rec);toast('Thêm sinh viên thành công!');
    } else {DB.sinh_vien[editingIndex]=rec;toast('Cập nhật thành công!');}
  } else if(editingTable==='gv'){
    const id=g('f_id'),ten=g('f_ten');
    if(!id||!ten){toast('Vui lòng điền đầy đủ!','error');return;}
    const rec={id,ho_ten:ten,trinh_do:g('f_td'),ma_khoa:g('f_khoa'),email:g('f_email')};
    if(editingIndex===null){DB.giang_vien.push(rec);toast('Thêm giảng viên thành công!');}
    else{DB.giang_vien[editingIndex]=rec;toast('Cập nhật thành công!');}
  } else if(editingTable==='mh'){
    const ma=g('f_ma'),ten=g('f_ten'),tc=parseInt(g('f_tc'));
    if(!ma||!ten||!tc){toast('Vui lòng điền đầy đủ!','error');return;}
    const rec={ma,ten,tc,ma_khoa:g('f_khoa')};
    if(editingIndex===null){DB.mon_hoc.push(rec);toast('Thêm môn học thành công!');}
    else{DB.mon_hoc[editingIndex]=rec;toast('Cập nhật thành công!');}
  } else if(editingTable==='diem'){
    const tk=parseFloat(g('f_tk'));
    const rec={ma_sv:g('f_sv'),ma_lhp:'LHP_NEW',mon:g('f_mon'),cc:parseFloat(g('f_cc')),gk:parseFloat(g('f_gk')),ck:parseFloat(g('f_ck')),tk,xl:g('f_xl')};
    if(editingIndex===null){DB.diem.push(rec);toast('Thêm điểm thành công!');}
    else{DB.diem[editingIndex]=rec;toast('Cập nhật điểm thành công!');}
  } else if(editingTable==='lop'){
    const ma=g('f_ma'),ten=g('f_ten'),khoa=g('f_khoa');
    if(!ma||!ten||!khoa){toast('Vui lòng điền đầy đủ!','error');return;}
    const rec={ma_lop:ma,ten_lop:ten,khoa};
    if(editingIndex===null){DB.lop.push(rec);toast('Thêm lớp thành công!');}
    else{DB.lop[editingIndex]=rec;toast('Cập nhật thành công!');}
  } else if(editingTable==='khoa'){
    const ma=g('f_ma'),ten=g('f_ten');
    if(!ma||!ten){toast('Vui lòng điền đầy đủ!','error');return;}
    const rec={ma_khoa:ma,ten_khoa:ten};
    if(editingIndex===null){DB.khoa.push(rec);toast('Thêm khoa thành công!');}
    else{DB.khoa[editingIndex]=rec;toast('Cập nhật thành công!');}
  }
  closeModal(); render();
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── INIT ──
render();
</script>
</body>
</html>
